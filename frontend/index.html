<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0C0C0C" />
        <meta
            name="description"
            content="Roger — Full Stack Developer building scalable web & mobile applications."
        />
        <title>Roger — Full Stack Developer</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap"
            rel="stylesheet"
        />
        <script>
            (function () {
                try {
                    var stored = localStorage.getItem("roger-portfolio-theme");
                    var prefersLight = window.matchMedia(
                        "(prefers-color-scheme: light)",
                    ).matches;
                    var isDark = stored ? stored === "dark" : !prefersLight;
                    document.documentElement.classList.toggle("dark", isDark);
                    document.documentElement.style.colorScheme = isDark
                        ? "dark"
                        : "light";
                } catch (e) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
