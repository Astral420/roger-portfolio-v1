name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render now-playing endpoint
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          if [ -z "$RENDER_KEEPALIVE_URL" ]; then
            echo "RENDER_KEEPALIVE_URL is not set"
            exit 1
          fi

          curl --fail --show-error --silent --max-time 20 "$RENDER_KEEPALIVE_URL" > /dev/null
